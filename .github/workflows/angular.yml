name: Angular CI with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # package-lock.json is authored by npm 11 (local dev). node-20 ships npm
      # 10, which mis-reads that lockfile as out-of-sync ("Missing: chokidar...")
      # and fails `npm ci`. Pin npm to 11 so CI matches the lockfile author.
      - name: Pin npm to 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Run unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadlessCI

      - name: Build Angular project
        run: npm run buildprod

      # Docker steps
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag Docker image
        run: |
          BRANCH_NAME=$(echo "${GITHUB_REF##*/}")
          docker build -t ghcr.io/${{ github.repository }}:${BRANCH_NAME} .

      - name: Push Docker image
        run: |
          BRANCH_NAME=$(echo "${GITHUB_REF##*/}")
          docker push ghcr.io/${{ github.repository }}:${BRANCH_NAME}


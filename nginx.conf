server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # PWA: serve the web app manifest with the correct media type.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # PWA: the service worker, its config, and the app shell must always be
    # revalidated so a new deploy rolls out promptly instead of being pinned
    # to a stale cached copy (Angular ngsw guidance).
    location = /ngsw-worker.js   { add_header Cache-Control "no-cache"; }
    location = /ngsw.json        { add_header Cache-Control "no-cache"; }
    location = /safety-worker.js { add_header Cache-Control "no-cache"; }
    location = /index.html       { add_header Cache-Control "no-cache"; }

    # Runtime environment config is generated per-deploy (docker-entrypoint.sh);
    # it must never be cached or the SPA could boot against stale URLs.
    location = /assets/config.js { add_header Cache-Control "no-cache"; }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
